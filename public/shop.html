<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop - Gray Rock</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" type="image/png" href="images/logo.png">
</head>
<body>
  <!-- Header -->
  <header class="header header-scrolled">
    <div class="header-left">
      <a href="index.html" class="logo-link">
        <img src="images/logo.png" alt="Gray Rock">
      </a>
      <nav>
        <ul class="nav-menu">
          <li><a href="index.html">Home</a></li>
          <li><a href="shop.html" class="nav-active">Shop</a></li>
          <li><a href="learn.html">Learn</a></li>
          <li><a href="connect.html">Connect</a></li>
        </ul>
      </nav>
    </div>
    <div class="header-ctas">
      <button type="button" class="btn btn-console" id="consoleBtn" aria-label="Open event console">Console</button>
      <a href="signin.html" class="btn btn-outline" id="authBtn">Sign In</a>
      <a href="account.html" class="btn btn-outline">Account</a>
    </div>
  </header>

  <main class="shop-page">
    <section class="section">
      <h1 class="shop-title">Product Collection</h1>
      <p class="shop-desc">From essentials to premium — explore our curated selection of products.</p>

      <div class="shop-filters">
        <div class="shop-filter-group">
          <label class="shop-filter-label">Category</label>
          <div class="shop-filter-buttons" id="categoryFilters">
            <button type="button" class="shop-filter-btn active" data-category="">All</button>
            <button type="button" class="shop-filter-btn" data-category="earth-garden">Home & Garden</button>
            <button type="button" class="shop-filter-btn" data-category="collectibles">Collectibles</button>
            <button type="button" class="shop-filter-btn" data-category="space">Premium</button>
          </div>
        </div>
        <div class="shop-filter-group">
          <label class="shop-filter-label">Price</label>
          <select id="priceFilter" class="shop-filter-select">
            <option value="">All prices</option>
            <option value="under-50">Under $50</option>
            <option value="50-500">$50 – $500</option>
            <option value="500-5000">$500 – $5,000</option>
            <option value="5000-plus">$5,000+</option>
          </select>
        </div>
      </div>

      <div class="shop-grid" id="shopGrid"></div>
      <p id="shopEmpty" class="shop-empty" style="display:none">No products match your filters.</p>
    </section>
  </main>

  <footer class="footer">
    <p>&copy; Gray Rock. All rights reserved. <a href="#" id="cookiePreferences">Cookie preferences</a> · <a href="admin.html">Admin Page</a></p>
  </footer>

  <div class="event-console" id="eventConsole" aria-hidden="true">
    <div class="event-console-header">
      <h3>Salesforce Events</h3>
      <div class="event-console-actions">
        <button type="button" class="event-console-toggle" id="consoleToggle" aria-label="Move console left or right"></button>
        <button type="button" class="event-console-close" id="consoleClose" aria-label="Close console">&times;</button>
      </div>
    </div>
    <div class="event-console-output" id="eventOutput"></div>
    <button type="button" class="btn btn-console btn-console-clear" id="consoleClear">Clear</button>
  </div>

  <script src="https://cdn.c360a.salesforce.com/beacon/c360a/75a89832-fee6-4979-b0e4-738ab6ed2fa3/scripts/c360a.min.js"></script>
  <script src="js/consent.js"></script>
  <script src="js/console.js"></script>
  <script src="js/salesforce-init.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/products.js"></script>
  <script src="js/cart.js"></script>
  <script>
    (function() {
      var products = [];
      var grid = document.getElementById('shopGrid');
      var emptyEl = document.getElementById('shopEmpty');
      var categoryFilters = document.getElementById('categoryFilters');
      var priceFilter = document.getElementById('priceFilter');
      if (!grid) return;

      var state = { category: '', price: '' };

      function formatPrice(n) {
        return '$' + n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      }

      function matchesPrice(p, range) {
        if (!range) return true;
        if (range === 'under-50') return p.price < 50;
        if (range === '50-500') return p.price >= 50 && p.price < 500;
        if (range === '500-5000') return p.price >= 500 && p.price < 5000;
        if (range === '5000-plus') return p.price >= 5000;
        return true;
      }

      function matchesCategory(p, cat) {
        if (!cat) return true;
        return (p.category || '') === cat;
      }

      function imgClass(p) {
        return (p.image_class || p.id || '').replace(/[^a-z0-9-]/gi, '');
      }

      function render() {
        var filtered = products.filter(function(p) {
          return matchesCategory(p, state.category) && matchesPrice(p, state.price);
        });

        if (filtered.length === 0) {
          grid.innerHTML = '';
          if (emptyEl) emptyEl.style.display = 'block';
          return;
        }
        if (emptyEl) emptyEl.style.display = 'none';

        grid.innerHTML = filtered.map(function(p) {
          var desc = (p.description || '').substring(0, 80);
          if (desc.length === 80) desc += '…';
          return '<article class="product-card">' +
            '<a href="product.html?id=' + encodeURIComponent(p.id) + '" class="product-card-link">' +
              '<div class="product-image product-image-' + imgClass(p) + '"></div>' +
              '<div class="product-card-body">' +
                '<h2 class="product-card-name">' + (p.name || '') + '</h2>' +
                '<p class="product-card-desc">' + desc + '</p>' +
                '<span class="product-card-price">' + formatPrice(parseFloat(p.price)) + '</span>' +
              '</div>' +
            '</a>' +
          '</article>';
        }).join('');
      }

      if (categoryFilters) {
        categoryFilters.addEventListener('click', function(e) {
          var btn = e.target.closest('.shop-filter-btn');
          if (!btn) return;
          categoryFilters.querySelectorAll('.shop-filter-btn').forEach(function(b) { b.classList.remove('active'); });
          btn.classList.add('active');
          state.category = btn.dataset.category || '';
          render();
        });
      }

      if (priceFilter) {
        priceFilter.addEventListener('change', function() {
          state.price = priceFilter.value || '';
          render();
        });
      }

      function loadProducts() {
        fetch('/api/products')
          .then(function(r) { return r.json(); })
          .then(function(data) {
            products = data.products || [];
            render();
          })
          .catch(function() {
            products = window.orgGrayRockProducts || [];
            render();
          });
      }
      loadProducts();

      var pref = document.getElementById('cookiePreferences');
      if (pref) pref.addEventListener('click', function(e) { e.preventDefault(); window.orgGrayRockShowConsentPopup && window.orgGrayRockShowConsentPopup(); });
    })();
  </script>
</body>
</html>
